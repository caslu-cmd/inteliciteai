<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelicite IA — Demonstrações</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.1); max-width: 480px; width: 100%; overflow: hidden; }
  .header { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); color: white; padding: 32px; text-align: center; }
  .badge { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25); border-radius: 20px; font-size: 11px; font-weight: 700; padding: 4px 14px; letter-spacing: 1px; display: inline-block; margin-bottom: 14px; }
  .header h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .header p { font-size: 13px; opacity: .75; }
  .body { padding: 28px; }
  .demo-item { display: flex; align-items: center; gap: 14px; padding: 16px; border: 1px solid #e5e7eb; border-radius: 12px; margin-bottom: 12px; text-decoration: none; color: inherit; transition: border-color .15s, box-shadow .15s; }
  .demo-item:hover { border-color: #86efac; box-shadow: 0 2px 12px rgba(21,128,61,.1); }
  .demo-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .demo-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  .demo-title { font-size: 14px; font-weight: 600; color: #111827; }
  .demo-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .arrow { margin-left: auto; color: #9ca3af; flex-shrink: 0; }
  .footer { text-align: center; padding: 0 28px 24px; font-size: 11px; color: #9ca3af; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="badge">INTELICITE IA</div>
    <h1>Demonstrações</h1>
    <p>Documentos gerados com IA para licitações públicas · Lei 14.133/2021</p>
  </div>
  <div class="body">
    <a href="etp-merenda-fortaleza.html" class="demo-item">
      <div class="demo-icon" style="background:#f0fdf4;">📋</div>
      <div>
        <div class="demo-label" style="color:#15803d;">ETP Completo</div>
        <div class="demo-title">Merenda Escolar — Prefeitura de Fortaleza</div>
        <div class="demo-sub">Com relatórios históricos e previsão IA 2026 · PNAE</div>
      </div>
      <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  </div>
  <div class="footer">Intelicite IA · SaaS de IA para Licitações Públicas · Lei 14.133/2021</div>
</div>
</body>
</html>
